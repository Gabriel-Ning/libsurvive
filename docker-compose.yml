version: '3.8'

services:
  libsurvive:
    build:
      context: .
      dockerfile: Dockerfile.ros
    entrypoint: ["/bin/bash", "-c"]
    command:
      - "source /opt/ros/noetic/setup.bash && mkdir -p /root/.config/libsurvive && rm -f /root/.config/libsurvive/config.json && survive-cli --force-calibrate"
    privileged: true
    volumes:
      - /dev:/dev
      - ${HOME}/.config/libsurvive:/root/.config/libsurvive

  libsurvive-viz:
    build:
      context: .
      dockerfile: Dockerfile.ros
    entrypoint: ["/bin/bash", "-c"]
    command:
      - "source /opt/ros/noetic/setup.bash && websocketd --port 8080 survive-cli --record-stdout --record-cal-imu --report-covariance 30"
    privileged: true
    ports:
      - "8080:8080"
    volumes:
      - /dev:/dev
      - ${HOME}/.config/libsurvive:/root/.config/libsurvive
